name: tutorial1
on:
  push:
    branches:
      - dev

jobs: 
  job1:
    name: job1
    runs-on: ubuntu-latest
    steps:
    - name: setup python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    - name: check version of python
      run: python --version
  job2:
    name: job2
    runs-on: windows-latest
    steps:
    - name: step2
      run: echo "Hello from job2 on $(date)" 
  job3:
    name: job3
    runs-on: ubuntu-latest
    steps:
    - name: step3
      run: echo "Hello from job3 on $(date)" 
  job4:
    name: job4
    runs-on: ubuntu-latest
    needs: [job1, job2]
    steps:
    - name: step3
      run: echo "I am job 4 @ $(date)" 