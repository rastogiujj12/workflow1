name: tutorial1
on: push

jobs: 
  job1:
    name: job1
    runs-on: ubuntu-latest
    steps:
    - name: setup python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
  job2:
    name: job2
    runs-on: windows-latest
    steps:
    - name: step2
      run: echo "Hello from job2 on date('Y-m-d')" 
  job3:
    name: job3
    runs-on: ubuntu-latest
    steps:
    - name: step3
      run: echo "Hello from job3 on date('Y-m-d')" 
  job4:
    name: job4
    runs-on: ubuntu-latest
    needs: [job1, job2]
    steps:
    - name: step3
      run: echo "I am job 4 @ date('Y-m-d')" 